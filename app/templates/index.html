<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Plot2Eq 📈</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        .canvas-wrapper {
            position: relative;
            width: 100%;
            max-width: 600px;
            aspect-ratio: 1 / 1;
            background-color: white;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            overflow: hidden;
            margin: 0 auto;
        }

        .canvas-wrapper canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        #drawCanvas {
            touch-action: none;
        }

        .tab-btn {
            border-bottom-width: 3px;
            border-color: transparent;
        }

        .tab-btn.active {
            border-color: #2563eb;
            color: #2563eb;
            font-weight: 600;
            background-color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        @media (min-width: 1024px) {
            .results-scroll {
                max-height: calc(100vh - 200px);
                overflow-y: auto;
                padding-right: 8px;
            }
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-800 min-h-screen">

    <header class="bg-white shadow-sm px-6 py-4 mb-6">
        <h1 class="text-3xl font-bold max-w-[1600px] mx-auto text-center md:text-left">Plot2Eq: Угадай формулу 📈</h1>
    </header>

    <div class="max-w-[1600px] mx-auto px-4 grid grid-cols-1 xl:grid-cols-12 gap-6 pb-12">

        <!-- Боковая панель с настройками -->
        <div class="xl:col-span-3 space-y-4 order-2 xl:order-1">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <h3 class="text-lg font-bold mb-4">ML Настройки</h3>

                <div class="space-y-4">
                    <div>
                        <label class="block text-sm text-gray-700 mb-1">
                            Beam Search: <span id="beamVal" class="text-blue-600 font-bold">7</span>
                        </label>
                        <input type="range" id="beamSize" min="1" max="15" value="7" class="w-full">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-700 mb-1">
                            Top-K: <span id="topVal" class="text-blue-600 font-bold">3</span>
                        </label>
                        <input type="range" id="topK" min="1" max="5" value="3" class="w-full">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-700 mb-1">
                            Коэффициент штрафа за длину: <span id="lenPenVal"
                                class="text-blue-600 font-bold">0.01</span>
                        </label>
                        <input type="range" id="lengthPenalty" min="0" max="0.2" step="0.01" value="0.01"
                            class="w-full">
                    </div>
                </div>

                <div class="mt-6 pt-4 border-t border-gray-200">
                    <h3 class="text-sm font-bold mb-3 text-gray-800">Оптимизация констант (SciPy)</h3>

                    <label
                        class="flex items-center space-x-2 cursor-pointer mb-4 p-2 bg-yellow-50 rounded-lg border border-yellow-200 hover:bg-yellow-100 transition">
                        <input type="checkbox" id="fastMode"
                            class="form-checkbox h-5 w-5 text-yellow-600 rounded cursor-pointer">
                        <span class="text-sm font-bold text-yellow-800">Быстрый режим</span>
                        <span
                            title="Использует быстрый, но менее точный локальный оптимизатор (curve_fit) вместо глобального (differential_evolution)."
                            class="text-gray-400 cursor-help">(?)</span>
                    </label>

                    <div id="advOptSettings" class="space-y-4 transition-opacity duration-200">
                        <div>
                            <label class="block text-sm text-gray-700 mb-1">
                                Max Итераций: <span id="iterVal" class="text-blue-600 font-bold">200</span>
                            </label>
                            <input type="range" id="maxIter" min="10" max="300" step="10" value="200" class="w-full">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-700 mb-1">
                                Размер популяции: <span id="popVal" class="text-blue-600 font-bold">15</span>
                            </label>
                            <input type="range" id="popSize" min="2" max="30" step="1" value="15" class="w-full">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div
            class="xl:col-span-9 order-1 xl:order-2 bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden flex flex-col">

            <div class="flex border-b border-gray-200 bg-gray-50 px-4 md:px-8">
                <button
                    class="tab-btn active px-4 py-4 md:px-6 md:py-5 text-sm md:text-base focus:outline-none transition-colors text-gray-500 hover:text-gray-700"
                    data-target="tab-draw">
                    Нарисовать от руки
                </button>
                <button
                    class="tab-btn px-4 py-4 md:px-6 md:py-5 text-sm md:text-base focus:outline-none transition-colors text-gray-500 hover:text-gray-700"
                    data-target="tab-formula">
                    Ввод формулы
                </button>
            </div>

            <div class="p-4 md:p-8 grid grid-cols-1 xl:grid-cols-2 gap-8 flex-1">

                <div class="flex flex-col">

                    <div id="tab-draw" class="tab-content active flex-1">
                        <div class="canvas-wrapper mb-4">
                            <canvas id="gridCanvasDraw" width="600" height="600"
                                style="z-index: 1; pointer-events: none;"></canvas>
                            <canvas id="drawCanvas" width="600" height="600" style="z-index: 2;"></canvas>
                        </div>
                        <div class="flex gap-4 max-w-[600px] mx-auto">
                            <button id="clearBtn"
                                class="bg-gray-100 hover:bg-gray-200 text-gray-800 font-bold py-3 px-6 rounded-lg transition">Очистить</button>
                            <button id="predictDrawBtn"
                                class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg transition shadow">Распознать</button>
                        </div>
                    </div>

                    <div id="tab-formula" class="tab-content flex-1">
                        <input type="text" id="formulaInput" value="x + sin((x / 1.5)^2)"
                            class="w-full max-w-[600px] mx-auto block text-base sm:text-lg p-4 border border-gray-300 rounded-lg shadow-sm focus:ring-2 focus:ring-blue-500 outline-none font-mono transition mb-4"
                            placeholder="Например: sin(x) * 5">

                        <div class="canvas-wrapper mb-4 relative">
                            <canvas id="gridCanvasFormula" width="600" height="600"
                                style="z-index: 1; pointer-events: none;"></canvas>
                            <canvas id="previewCanvas" width="600" height="600"
                                style="z-index: 2; pointer-events: none;"></canvas>
                            <div id="livePlotLoading"
                                class="absolute inset-0 flex items-center justify-center bg-white/50 hidden"
                                style="z-index: 3;">
                                <span class="text-blue-600 font-bold animate-pulse text-xl">Загрузка...</span>
                            </div>
                        </div>

                        <div class="max-w-[600px] mx-auto">
                            <button id="predictFormulaBtn"
                                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg transition shadow">Распознать
                                график</button>
                        </div>
                    </div>
                </div>

                <div class="flex flex-col border-t xl:border-t-0 xl:border-l border-gray-100 xl:pl-8 pt-8 xl:pt-0">
                    <h2 class="text-xl font-bold mb-6">Результаты модели</h2>
                    <div id="results" class="results-scroll space-y-6 pb-8">
                        <div
                            class="bg-gray-50 border border-dashed border-gray-300 rounded-xl p-8 text-center text-gray-400">
                            Жду ввода данных. Графики появятся здесь!
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>

        const beamSize = document.getElementById('beamSize');
        const topK = document.getElementById('topK');
        const lengthPenalty = document.getElementById('lengthPenalty');
        const fastMode = document.getElementById('fastMode');
        const maxIter = document.getElementById('maxIter');
        const popSize = document.getElementById('popSize');
        const advOptSettings = document.getElementById('advOptSettings');

        beamSize.addEventListener('input', (e) => document.getElementById('beamVal').innerText = e.target.value);
        topK.addEventListener('input', (e) => document.getElementById('topVal').innerText = e.target.value);
        lengthPenalty.addEventListener('input', (e) => document.getElementById('lenPenVal').innerText = e.target.value);
        maxIter.addEventListener('input', (e) => document.getElementById('iterVal').innerText = e.target.value);
        popSize.addEventListener('input', (e) => document.getElementById('popVal').innerText = e.target.value);


        fastMode.addEventListener('change', (e) => {
            if (e.target.checked) {
                advOptSettings.classList.add('opacity-40', 'pointer-events-none');
            } else {
                advOptSettings.classList.remove('opacity-40', 'pointer-events-none');
            }
        });


        let currentMode = 'draw';
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('active'); b.classList.add('text-gray-500'); });
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active'); btn.classList.remove('text-gray-500');

                const targetId = btn.getAttribute('data-target');
                document.getElementById(targetId).classList.add('active');
                currentMode = targetId === 'tab-draw' ? 'draw' : 'formula';
            });
        });


        function drawGrid(ctx, w, h) {
            ctx.clearRect(0, 0, w, h);
            ctx.strokeStyle = '#e5e7eb'; ctx.lineWidth = 1;
            const steps = 10; const stepPx = w / (steps * 2);
            for (let i = 0; i <= steps * 2; i++) {
                const pos = i * stepPx;
                ctx.beginPath(); ctx.moveTo(pos, 0); ctx.lineTo(pos, h); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, pos); ctx.lineTo(w, pos); ctx.stroke();
            }
            ctx.strokeStyle = '#1f2937'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(w / 2, 0); ctx.lineTo(w / 2, h); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, h / 2); ctx.lineTo(w, h / 2); ctx.stroke();
        }

        function getCanvasCoords(x, y, w, h) {
            return { px: ((x + 10) / 20) * w, py: ((10 - y) / 20) * h };
        }

        function drawLine(ctx, xArr, yArr, w, h, color, lineWidth = 3) {
            ctx.strokeStyle = color; ctx.lineWidth = lineWidth; ctx.lineJoin = 'round'; ctx.lineCap = 'round';
            ctx.beginPath();
            let isDrawing = false;
            let lastY = null;

            for (let i = 0; i < xArr.length; i++) {
                if (yArr[i] === null) {
                    isDrawing = false;
                } else {
                    if (lastY !== null && Math.abs(yArr[i] - lastY) > 10) {
                        isDrawing = false;
                    }
                    const { px, py } = getCanvasCoords(xArr[i], yArr[i], w, h);
                    if (!isDrawing) {
                        ctx.moveTo(px, py); isDrawing = true;
                    } else {
                        ctx.lineTo(px, py);
                    }
                    lastY = yArr[i];
                }
            }
            ctx.stroke();
        }

        function drawScatter(ctx, xArr, yArr, w, h, color) {
            ctx.fillStyle = color;
            for (let i = 0; i < xArr.length; i++) {
                if (yArr[i] !== null) {
                    const { px, py } = getCanvasCoords(xArr[i], yArr[i], w, h);
                    ctx.beginPath(); ctx.arc(px, py, 3, 0, 2 * Math.PI); ctx.fill();
                }
            }
        }

        const w = 600, h = 600;
        drawGrid(document.getElementById('gridCanvasDraw').getContext('2d'), w, h);
        drawGrid(document.getElementById('gridCanvasFormula').getContext('2d'), w, h);

        const drawCanvas = document.getElementById('drawCanvas');
        const dCtx = drawCanvas.getContext('2d');
        dCtx.strokeStyle = '#000000'; dCtx.lineWidth = 4; dCtx.lineCap = 'round'; dCtx.lineJoin = 'round';


        function getEventPos(e) {
            const rect = drawCanvas.getBoundingClientRect();
            const clientX = e.touches && e.touches.length > 0 ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches && e.touches.length > 0 ? e.touches[0].clientY : e.clientY;

            return {
                x: (clientX - rect.left) * (drawCanvas.width / rect.width),
                y: (clientY - rect.top) * (drawCanvas.height / rect.height)
            };
        }

        let isDrawing = false;
        let lastPos = { x: 0, y: 0 };
        let prevPos = { x: 0, y: 0 };

        function startDrawing(e) {
            if (e.type.includes('touch')) e.preventDefault();
            isDrawing = true;
            lastPos = getEventPos(e);
            prevPos = lastPos;

            dCtx.beginPath();
            dCtx.arc(lastPos.x, lastPos.y, dCtx.lineWidth / 2, 0, Math.PI * 2);
            dCtx.fillStyle = dCtx.strokeStyle;
            dCtx.fill();
        }

        function draw(e) {
            if (!isDrawing) return;
            if (e.type.includes('touch')) e.preventDefault();

            const currentPos = getEventPos(e);
            const midPoint = {
                x: (lastPos.x + currentPos.x) / 2,
                y: (lastPos.y + currentPos.y) / 2
            };

            dCtx.beginPath();
            dCtx.moveTo(prevPos.x, prevPos.y);
            dCtx.quadraticCurveTo(lastPos.x, lastPos.y, midPoint.x, midPoint.y);
            dCtx.stroke();

            prevPos = midPoint;
            lastPos = currentPos;
        }

        function stopDrawing(e) {
            isDrawing = false;
        }

        drawCanvas.addEventListener('mousedown', startDrawing);
        drawCanvas.addEventListener('mousemove', draw);
        drawCanvas.addEventListener('mouseup', stopDrawing);
        drawCanvas.addEventListener('mouseout', stopDrawing);

        drawCanvas.addEventListener('touchstart', startDrawing, { passive: false });
        drawCanvas.addEventListener('touchmove', draw, { passive: false });
        drawCanvas.addEventListener('touchend', stopDrawing);
        drawCanvas.addEventListener('touchcancel', stopDrawing);

        document.getElementById('clearBtn').addEventListener('click', () => { dCtx.clearRect(0, 0, w, h); });

        const formulaInput = document.getElementById('formulaInput');
        const pCtx = document.getElementById('previewCanvas').getContext('2d');
        let debounceTimer;

        async function fetchLivePlot(formula) {
            if (!formula.trim()) { pCtx.clearRect(0, 0, w, h); return; }
            document.getElementById('livePlotLoading').classList.remove('hidden');
            try {
                const res = await fetch('/render_formula', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ formula: formula })
                });
                const data = await res.json();
                pCtx.clearRect(0, 0, w, h);
                if (data.x && data.x.length > 0) {
                    drawLine(pCtx, data.x, data.y, w, h, '#2563eb', 4);
                }
            } catch (e) { console.error(e); }
            document.getElementById('livePlotLoading').classList.add('hidden');
        }

        fetchLivePlot(formulaInput.value);
        formulaInput.addEventListener('input', (e) => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => fetchLivePlot(e.target.value), 300);
        });

        async function doPredict() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = `<div class="bg-blue-50 p-6 rounded-xl border border-blue-200 text-blue-600 font-bold text-center animate-pulse">⏳ Нейросеть думает...</div>`;

            const payload = {
                mode: currentMode,
                beam_size: parseInt(beamSize.value),
                top_k: parseInt(topK.value),
                length_penalty: parseFloat(lengthPenalty.value),
                fast_mode: fastMode.checked,
                opt_max_iter: parseInt(maxIter.value),
                opt_popsize: parseInt(popSize.value)
            };

            if (currentMode === 'draw') payload.image_base64 = drawCanvas.toDataURL('image/png');
            else payload.formula = formulaInput.value;

            try {
                const response = await fetch('/predict', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                const data = await response.json();

                if (!response.ok && data.detail) {
                    resultsDiv.innerHTML = `<div class="bg-red-50 p-4 border border-red-200 text-red-600 rounded-lg"><b>Ошибка валидации:</b> Недопустимые значения параметров. Не пытайтесь сломать бекенд! 🕵️‍♂️</div>`;
                    return;
                }

                if (data.error) {
                    resultsDiv.innerHTML = `<div class="bg-red-50 p-4 border border-red-200 text-red-600 rounded-lg"><b>Ошибка:</b> ${data.error}</div>`;
                    return;
                }

                resultsDiv.innerHTML = '';

                data.results.forEach((res, idx) => {
                    const id = `resCanvas_${idx}`;
                    resultsDiv.innerHTML += `
                        <div class="bg-white rounded-xl shadow border border-gray-200 overflow-hidden">
                            <div class="bg-gray-50 border-b border-gray-200 p-4 flex justify-between items-center">
                                <span class="bg-blue-100 text-blue-800 text-sm font-bold px-3 py-1 rounded">Кандидат #${idx + 1}</span>
                                <div class="text-right">
                                    <span class="text-sm text-gray-500 block">MSE: <b>${res.mse.toFixed(4)}</b></span>
                                    <span class="text-xs text-gray-400 block">Score: ${res.score.toFixed(4)}</span>
                                </div>
                            </div>
                            <div class="p-6 text-center">
                                <div class="relative group text-xl md:text-2xl overflow-x-auto py-4 mb-4 text-center rounded-lg hover:bg-gray-50 transition">
                                    \\[ y = ${res.latex} \\]
                                    <button onclick="copyLatex('${res.latex.replace(/\\/g, '\\\\')}', this)" 
                                            class="absolute top-2 right-2 opacity-100 md:opacity-0 group-hover:opacity-100 transition shadow-sm border border-gray-200 bg-white hover:bg-gray-100 text-gray-600 text-xs px-3 py-1.5 rounded-md flex items-center gap-1 cursor-pointer">
                                        📋 Коп.
                                    </button>
                                </div>
                                <div class="flex justify-center mb-4">
                                    <div class="canvas-wrapper max-w-[400px]">
                                        <canvas id="grid_${id}" width="400" height="400" style="z-index: 1;"></canvas>
                                        <canvas id="${id}" width="400" height="400" style="z-index: 2;"></canvas>
                                    </div>
                                </div>
                                <p class="text-xs font-mono text-gray-500 bg-gray-100 p-3 rounded overflow-x-auto whitespace-nowrap mt-4 text-left">
                                    ${res.skeleton}
                                </p>
                            </div>
                        </div>
                    `;
                });

                data.results.forEach((res, idx) => {
                    const id = `resCanvas_${idx}`;
                    const gridCtx = document.getElementById(`grid_${id}`).getContext('2d');
                    const resCtx = document.getElementById(id).getContext('2d');
                    const wRes = 400, hRes = 400;

                    drawGrid(gridCtx, wRes, hRes);
                    drawScatter(resCtx, data.scatter_x, data.scatter_y, wRes, hRes, '#9ca3af');
                    drawLine(resCtx, data.dense_x, res.pred_y, wRes, hRes, '#ef4444', 3);
                });

                MathJax.typesetPromise();
            } catch (err) {
                resultsDiv.innerHTML = `<div class="bg-red-50 p-4 text-red-600 rounded">Ошибка сети. Проверьте консоль.</div>`;
            }
        }

        document.getElementById('predictDrawBtn').addEventListener('click', doPredict);
        document.getElementById('predictFormulaBtn').addEventListener('click', doPredict);
        formulaInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') doPredict(); });

        window.copyLatex = function (latex, btn) {
            navigator.clipboard.writeText(latex).then(() => {
                const originalHTML = btn.innerHTML;
                btn.innerHTML = '✅ Скопировано!';
                btn.classList.add('bg-green-100', 'text-green-700', 'border-green-300');
                setTimeout(() => {
                    btn.innerHTML = originalHTML;
                    btn.classList.remove('bg-green-100', 'text-green-700', 'border-green-300');
                }, 2000);
            });
        }
    </script>
</body>

</html>
